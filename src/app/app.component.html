<div class="bg-gray-900 min-h-screen text-gray-100 relative">
  <!-- Header with hamburger -->
  <header class="bg-gradient-to-r from-indigo-700 to-purple-700 text-white p-6 rounded-lg shadow flex justify-between items-center">
    <!-- Title -->
    <div>
      <h1 class="text-3xl font-bold">Energy Dashboard</h1>
    </div>

    <!-- Hamburger icon -->
    <button (click)="toggleMenu()" class="text-white focus:outline-none">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </header>

  <!-- Routed page content -->
  <router-outlet></router-outlet>

  <!-- Right side drawer with slide animation -->
  <div class="fixed top-0 right-0 w-64 h-full bg-gray-800 shadow-lg p-6 transform transition-transform duration-300"
       [class.translate-x-full]="!menuOpen"
       [class.translate-x-0]="menuOpen">
    <button (click)="toggleMenu()" class="text-gray-400 hover:text-gray-200 mb-6">Close ✕</button>
    <nav class="flex flex-col space-y-4">
      <a routerLink="/dashboard" routerLinkActive="text-indigo-400" class="hover:text-indigo-300">Dashboard</a>
      <a routerLink="/analytics" routerLinkActive="text-indigo-400" class="hover:text-indigo-300">Analytics</a>
      <a routerLink="/reports" routerLinkActive="text-indigo-400" class="hover:text-indigo-300">Reports</a>
      <a routerLink="/settings" routerLinkActive="text-indigo-400" class="hover:text-indigo-300">Settings</a>
      <a routerLink="/about" routerLinkActive="text-indigo-400" class="hover:text-indigo-300">About</a>
      <button *ngIf="authService.isLoggedIn()" 
        (click)="authService.logout()" 
        class="text-red-500 font-bold px-4 py-2 hover:bg-red-100 rounded transition">
        Logout
        </button>
    </nav>
  </div>
</div>
