<div class="min-h-screen flex flex-col items-center justify-center bg-gray-900 px-4">
  
  <div class="mb-8 text-center animate-fade-in">
    <h1 class="text-4xl font-black tracking-tighter text-white">
      ENERGY<span class="text-indigo-500">HUB</span>
    </h1>
    <p class="text-gray-500 text-xs mt-2 font-bold uppercase tracking-[0.3em]">
      Industrial IoT Portal
    </p>
  </div>
    
  <div class="max-w-md w-full bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
    <h2 class="text-2xl font-bold text-center text-white mb-8">Login</h2>
    
    <div class="space-y-5">
      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase mb-2 block">Username</label>
        <input #username type="text" placeholder="Enter username" 
               class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg text-white outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all">
      </div>

      <div>
        <label class="text-xs font-semibold text-gray-400 uppercase mb-2 block">Password</label>
        <input #password type="password" placeholder="••••••••" 
               class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg text-white outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all">
      </div>
      
      <button (click)="handleLogin(username.value, password.value)" 
        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-green-500/20 transition-all active:scale-[0.98]">
        Sign In
      </button>
      
      <div class="pt-4 border-t border-gray-700">
        <p class="text-gray-400 text-sm text-center">
          New here? 
          <a routerLink="/signup" class="text-indigo-400 font-semibold hover:text-indigo-300 transition-colors">Create account</a>
        </p>
      </div>
    </div>
  </div>

  <p class="mt-8 text-gray-600 text-[10px] uppercase tracking-widest">
    Powered by Evo Narrative Intelligence
  </p>
</div>
